<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Juego de Wordwall</title>
    <style>
        /* Estilos básicos para centrar el contenido y dar un buen diseño */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .contenedor-juego {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 90%;
        }

        h1 {
            color: #333333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        /* Asegura que el iframe sea responsivo en pantallas pequeñas */
        .iframe-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <div class="contenedor-juego">
        <h1>¡A Jugar!</h1>
        
        <div class="iframe-wrapper">
            <iframe style="max-width:100%" src="https://wordwall.net/es/embed/ad025694826f4821af8bee2c3592f221?themeId=1&templateId=5&fontStackId=0" width="500" height="380" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

</body>
</html>
